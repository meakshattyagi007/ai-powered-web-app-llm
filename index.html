<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ELI5 Explainer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #1f2937;
      box-sizing: border-box;
    }

    .container {
      width: min(700px, 100%);
      padding: 28px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 14px 35px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.08s ease, background 0.2s ease;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
      transform: none;
    }

    #result {
      margin-top: 20px;
      min-height: 80px;
      padding: 16px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
      line-height: 1.5;
      white-space: pre-wrap;
    }

    #result.loading {
      color: #1d4ed8;
    }

    #result.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #b91c1c;
    }

    #result.success {
      background: #f0fdf4;
      border-color: #bbf7d0;
      color: #166534;
    }

    @media (max-width: 640px) {
      .input-row {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ELI5 Explainer</h1>
    <p>Type any difficult topic, then click the button to get a super simple explanation.</p>

    <div class="input-row">
      <input
        id="topicInput"
        type="text"
        placeholder="Enter a complicated topic..."
        aria-label="Complicated topic input"
      />
      <button id="explainBtn" type="button">Explain It</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const API_KEY = "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";
    const topicInput = document.getElementById("topicInput");
    const explainBtn = document.getElementById("explainBtn");
    const resultBox = document.getElementById("result");

    async function explainTopic() {
      const topic = topicInput.value.trim();

      if (!topic) {
        resultBox.className = "error";
        resultBox.textContent = "Please type a topic first.";
        return;
      }

      if (API_KEY === "YOUR_API_KEY") {
        resultBox.className = "error";
        resultBox.textContent = "Add your Gemini API key in the script first.";
        return;
      }

      const endpoint = "https://openrouter.ai/api/v1/chat/completions";

      resultBox.className = "loading";
      resultBox.textContent = "Thinking...";
      explainBtn.disabled = true;
      explainBtn.textContent = "Explaining...";

      try {
        const response = await fetch(endpoint, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${API_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: "openrouter/free",
          messages: [
            {
              role: "system",
              content: "Explain difficult topics like the user is 5 years old. Keep it very simple, short, and easy."
            },
            {
              role: "user",
              content: `Explain "${topic}" as if I am five years old. Use very simple words and a short example.`
            }
          ]
        })
      });

        const data = await response.json();

        if (!response.ok) {
          const apiMessage =
            data?.error?.message ||
            data?.error?.status ||
            `Request failed with status ${response.status}`;
          throw new Error(apiMessage);
        }

        const result = data?.choices?.[0]?.message?.content;

        if (!result) {
          resultBox.className = "error";
          resultBox.textContent = "No explanation returned. Try again.";
        } else {
          resultBox.className = "success";
          resultBox.textContent = result;
        }
      } catch (error) {
        resultBox.className = "error";
        resultBox.textContent = `Something went wrong: ${error.message}`;
      } finally {
        explainBtn.disabled = false;
        explainBtn.textContent = "Explain It";
      }
    }

    explainBtn.addEventListener("click", explainTopic);
    topicInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        explainTopic();
      }
    });
  </script>
</body>
</html>
